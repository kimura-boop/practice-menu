  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--court); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; overscroll-behavior:none;}
  #app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; padding-bottom:96px;}

  header{padding:16px 16px 10px; position:sticky; top:0; background:var(--court); z-index:20; border-bottom:1px solid var(--line);}
  .brand-row{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .brand-row img{height:30px; width:auto; display:block;}
  header h1{margin:0; font-size:16px; font-weight:800; letter-spacing:.02em; color:var(--ink); padding-left:10px; border-left:2px solid var(--orange);}
  header h1 span{color:var(--orange);}
  .bottomlink{text-align:center; font-size:13.5px; font-weight:800; color:var(--muted); padding:14px 0 4px; cursor:pointer;}
  .bottomlink:active{color:var(--orange);}

  section{display:none; padding:16px;}
  section.active{display:block;}

  /* --- Builder view --- */
  .block-label{font-size:15px; letter-spacing:.02em; color:var(--ink); font-weight:800; margin:4px 2px 10px; padding-left:10px; border-left:4px solid var(--orange);}

  #groupNav{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px;}
  #groupNav .navchip{padding:7px 14px; border-radius:14px; font-size:12px; font-weight:800; border:1.5px solid var(--c); background:var(--court-2); color:var(--c); cursor:pointer;}
  #groupNav .navchip.active{background:var(--c); color:#fff;}

  #palette{margin-bottom:6px; min-height:44px;}
  .group-chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{background:var(--court-2); border:1.5px solid var(--c, var(--line)); color:var(--ink); padding:9px 13px; border-radius:20px; font-size:13.5px; font-weight:600; cursor:pointer; user-select:none;}
  .chip:active{background:var(--c, var(--orange)); border-color:var(--c, var(--orange));}
  .chip.empty-msg{color:var(--muted); font-size:12.5px; font-weight:500; border:none; background:none; padding:0;}

  #exportCardWrap{background:#d0d0d3; border:1px solid var(--line); border-radius:14px; padding:14px;}
  #exportCard{background:var(--paper); border-radius:6px; padding:16px 14px 22px; min-height:160px;}
  #titleRow{margin-bottom:10px;}
  #menuTitle{width:100%; border:none; background:transparent; font-size:15px; font-weight:800; color:var(--ink); padding:2px 2px 8px; border-bottom:2px solid var(--ink); font-family:inherit;}
  #menuTitle::placeholder{color:#9a927e; font-weight:700;}
  #menuTitle:focus{outline:none;}

  #sequenceList{list-style:none; margin:0; padding:0;}
  .tile{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:#f5f5f5; border:none; color:var(--ink);
    padding:11px 12px; margin-top:5px; font-weight:800; font-size:16px;
    width:fit-content; max-width:100%;
  }
  .tile:first-child{margin-top:0;}
  .tile .txt{white-space:normal; word-break:break-word; overflow-wrap:break-word;}
  .tile .del{
    flex:none; width:20px; height:20px; border-radius:50%; border:none; background:var(--paper-line);
    color:#6b6455; font-size:12px; font-weight:900; line-height:20px; text-align:center; cursor:pointer; padding:0;
  }
  .tile.dragging{opacity:.5;}

  #emptySeq{color:#9a927e; font-size:13px; font-weight:600; padding:20px 4px; text-align:center;}

  .hint{font-size:12px; color:var(--muted); margin-top:10px; line-height:1.6;}

  .actionbar{position:fixed; bottom:0; left:0; right:0; background:var(--court); border-top:1px solid var(--line); padding:10px 16px 16px; display:flex; gap:10px; max-width:520px; margin:0 auto;}
  .btn{flex:1; padding:13px 0; border-radius:11px; border:none; font-size:14.5px; font-weight:800; cursor:pointer;}
  .btn-primary{background:var(--orange); color:#fff;}
  .btn-primary:active{background:var(--orange-dark);}
  .btn-ghost{background:var(--court-2); color:var(--ink); border:1px solid var(--line); flex:0 0 84px;}

  /* --- Tag management view --- */
  .taginput-row{display:flex; gap:8px; margin-bottom:16px;}
  #newTagInput{flex:1; padding:11px 12px; border-radius:10px; border:1px solid var(--line); background:var(--court-2); color:var(--ink); font-size:14px;}
  #newTagInput::placeholder{color:var(--muted);}
  #newTagCategory{flex:0 0 118px; padding:0 8px; border-radius:10px; border:1px solid var(--line); background:var(--court-2); color:var(--ink); font-size:12.5px; font-weight:700;}
  #addTagBtn{padding:0 18px; border-radius:10px; border:none; background:var(--orange); color:#fff; font-weight:800; font-size:14px;}

  #tagList{list-style:none; margin:0; padding:0;}
  #tagList li{display:flex; align-items:center; gap:10px; padding:11px 4px; border-bottom:1px solid var(--line);}
  #tagList .tagtxt{flex:1; font-size:14.5px; font-weight:600;}
  #tagList .icnbtn{background:none; border:none; color:var(--muted); font-size:13px; padding:6px 8px; cursor:pointer; font-weight:700;}
  #tagList .icnbtn.danger{color:#e8631c;}

  .resetrow{margin-top:18px; text-align:center;}
  #resetTagsBtn{background:none; border:1px solid var(--line); color:var(--muted); font-size:12px; padding:8px 14px; border-radius:20px;}

  .toast{position:fixed; left:50%; transform:translateX(-50%); bottom:100px; background:#fff; color:var(--ink); padding:10px 18px; border-radius:20px; font-size:13px; font-weight:700; box-shadow:0 6px 20px rgba(0,0,0,.3); opacity:0; pointer-events:none; transition:opacity .25s, bottom .25s; z-index:50;}
  .toast.show{opacity:1; bottom:112px;}

  #previewOverlay{
    position:fixed; inset:0; background:rgba(10,12,16,.94); z-index:100;
    display:none; flex-direction:column; align-items:center; justify-content:flex-start;
    padding:18px 16px 24px; overflow-y:auto;
  }
  #previewOverlay.show{display:flex;}
  #previewOverlay .previewHint{color:#fff; font-size:13.5px; font-weight:700; text-align:center; margin-bottom:14px; line-height:1.6;}
  #previewOverlay .previewHint b{color:var(--orange);}
  #previewImg{max-width:100%; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,.4);}
  #closePreviewBtn{margin-top:18px; padding:12px 28px; border-radius:22px; border:1px solid var(--line); background:var(--court-2); color:var(--ink); font-size:14px; font-weight:700;}
</style>
</head>

    "First to X points game"
  ]},
  { name: "Tactics", color: "var(--cat-tac)", tags: [
    "BOB","SOB","HC 5-0 Walk-through","HC 5-0 Execution"
  ]}
];

const DEFAULT_TAGS = TAG_GROUPS.flatMap(g => g.tags);
const ORIGINAL_GROUPS = TAG_GROUPS.map(g => ({ name: g.name, color: g.color, tags: g.tags.slice() }));

function addTagToGroup(tag, groupName){
  const g = TAG_GROUPS.find(x => x.name === groupName);
  if(g) g.tags.push(tag);
}
function removeTagFromGroups(tag){
  TAG_GROUPS.forEach(g=>{
    const i = g.tags.indexOf(tag);
    if(i > -1) g.tags.splice(i,1);
  });
}
function renameTagInGroups(oldTag, newTag){
  TAG_GROUPS.forEach(g=>{
    const i = g.tags.indexOf(oldTag);
    if(i > -1) g.tags[i] = newTag;
  });
}

function categoryOf(tag){
  for(const g of TAG_GROUPS){ if(g.tags.includes(tag)) return g; }
  return { name: "その他", color: "var(--muted)" };
}

function slugify(name){
  return 'grp-' + name.replace(/[^a-zA-Z0-9\u3040-\u30ff\u4e00-\u9faf]+/g,'');
}

let presetTags = DEFAULT_TAGS.slice();
let sequence = []; // array of {id, text}
let seqCounter = 0;
let sortableInstance = null;
let paletteSortable = null;

function loadTags(){
  renderPalette();
  renderTagList();
}

function saveTags(){
  // ログイン不要で使えるよう、タグ一覧は保存せずセッション内のみで保持します
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1600);
}

// ---------- Palette (builder view) ----------
let currentGroup = null;

function renderPalette(){
  renderGroupNav();
  renderPaletteChips();
}

function renderGroupNav(){
  const nav = document.getElementById('groupNav');
  nav.innerHTML = '';

  if(presetTags.length === 0){ return; }

  const orderNames = TAG_GROUPS.map(g=>g.name).concat(['その他']);
  const colorByName = {};
  TAG_GROUPS.forEach(g=> colorByName[g.name] = g.color);
  colorByName['その他'] = 'var(--muted)';

  const hasTags = {};
  orderNames.forEach(name=>{
    hasTags[name] = presetTags.some(t => categoryOf(t).name === name);
  });

  if(!currentGroup || !hasTags[currentGroup]){
    currentGroup = orderNames.find(name => hasTags[name]) || null;
  }

  orderNames.forEach(name=>{
    if(!hasTags[name]) return;
    const chip = document.createElement('div');
    chip.className = 'navchip' + (name === currentGroup ? ' active' : '');
    chip.textContent = name;
    chip.style.setProperty('--c', colorByName[name]);
    chip.addEventListener('click', ()=>{
      currentGroup = name;
      renderGroupNav();
      renderPaletteChips();
    });
    nav.appendChild(chip);
  });
}

function renderPaletteChips(){
  const el = document.getElementById('palette');
  el.innerHTML = '';

  if(presetTags.length === 0){
    el.innerHTML = '<div class="chip empty-msg">タグ管理タブから単語を登録してください</div>';
    return;
  }
  if(!currentGroup){
    el.innerHTML = '<div class="chip empty-msg">タグがありません</div>';
    return;
  }

  const groupColor = currentGroup === 'その他'
    ? 'var(--muted)'
    : (TAG_GROUPS.find(g=>g.name===currentGroup) || {}).color || 'var(--muted)';

  const tags = presetTags.filter(t => categoryOf(t).name === currentGroup);
  const wrap = document.createElement('div');
  wrap.className = 'group-chips';
  tags.forEach(tag=>{
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = tag;
    chip.dataset.tag = tag;
    chip.style.setProperty('--c', groupColor);
    chip.addEventListener('click', ()=> addToSequence(tag));
    wrap.appendChild(chip);
  });
  el.appendChild(wrap);

  if(paletteSortable){ paletteSortable.destroy(); }
  const groupForSort = currentGroup;
  paletteSortable = new Sortable(wrap, {
    animation:150,
    delay:150,
    delayOnTouchOnly:true,
    ghostClass:'dragging',
    onEnd: ()=>{
      const newOrder = Array.from(wrap.children).map(c=>c.dataset.tag);
      const indices = [];
      presetTags.forEach((t,i)=>{ if(categoryOf(t).name === groupForSort) indices.push(i); });
      indices.forEach((idx,i)=>{ presetTags[idx] = newOrder[i]; });
      saveTags();
    }
  });
}

function addToSequence(text){
  sequence.push({id: 'seq'+(seqCounter++), text});
  renderSequence();
}

function renderSequence(){
  const list = document.getElementById('sequenceList');
  const empty = document.getElementById('emptySeq');
  list.innerHTML = '';
  empty.style.display = sequence.length ? 'none' : 'block';

  sequence.forEach(item=>{
    const li = document.createElement('li');
    li.className = 'tile';
    li.dataset.id = item.id;
    const span = document.createElement('span');
    span.className = 'txt';
    span.textContent = item.text;
    const del = document.createElement('button');
    del.className = 'del no-export';
    del.textContent = '✕';
    del.addEventListener('click', (e)=>{
      e.stopPropagation();
      sequence = sequence.filter(s=>s.id !== item.id);
      renderSequence();
    });
    li.appendChild(span);
    li.appendChild(del);
    list.appendChild(li);
  });

  if(sortableInstance){ sortableInstance.destroy(); }
  sortableInstance = new Sortable(list, {
    animation:150,
    delay:120,
    delayOnTouchOnly:true,
    ghostClass:'dragging',
    onEnd: ()=>{
      const ids = Array.from(list.children).map(li=>li.dataset.id);
      sequence = ids.map(id=> sequence.find(s=>s.id===id));
    }
  });
}

document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(sequence.length && !confirm('今日のメニューをすべて削除しますか？')) return;
  sequence = [];
  renderSequence();
});

document.getElementById('quickAddBtn').addEventListener('click', ()=>{
  const input = document.getElementById('quickAddInput');
  const val = input.value.trim();
  if(!val) return;
  addToSequence(val);
  input.value = '';
});
document.getElementById('quickAddInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ document.getElementById('quickAddBtn').click(); }
});

document.getElementById('exportBtn').addEventListener('click', async ()=>{
  const card = document.getElementById('exportCard');
  if(sequence.length === 0){
    showToast('タグを1つ以上追加してください');
    return;
  }
  const btn = document.getElementById('exportBtn');
  const original = btn.textContent;
  btn.textContent = '作成中...';
  btn.disabled = true;
  try{
    const canvas = await html2canvas(card, {
      backgroundColor: '#f4f2ec',
      scale: 3,
      ignoreElements: (el)=> el.classList && el.classList.contains('no-export')
    });
    const dataUrl = canvas.toDataURL('image/png');
    document.getElementById('previewImg').src = dataUrl;
    document.getElementById('previewOverlay').classList.add('show');
  }catch(e){
    showToast('画像の作成に失敗しました');
  }finally{
    btn.textContent = original;
    btn.disabled = false;
  }
});

document.getElementById('closePreviewBtn').addEventListener('click', ()=>{
  document.getElementById('previewOverlay').classList.remove('show');
});

// ---------- Tag management view ----------
function populateCategorySelect(){
  const sel = document.getElementById('newTagCategory');
  sel.innerHTML = '';
  TAG_GROUPS.forEach(g=>{
    const opt = document.createElement('option');
    opt.value = g.name;
    opt.textContent = g.name;
    sel.appendChild(opt);
  });
}

function renderTagList(){
  const list = document.getElementById('tagList');
  list.innerHTML = '';
  presetTags.forEach((tag, idx)=>{
    const li = document.createElement('li');
    const span = document.createElement('span');
    span.className = 'tagtxt';
    span.textContent = tag;
    const catTag = document.createElement('span');
    catTag.textContent = categoryOf(tag).name;
    catTag.style.cssText = 'font-size:10.5px; font-weight:700; color:var(--muted); margin-right:6px;';
    const editBtn = document.createElement('button');
    editBtn.className = 'icnbtn';
    editBtn.textContent = '編集';
    editBtn.addEventListener('click', ()=>{
      const next = prompt('タグを編集', tag);
      if(next === null) return;
      const trimmed = next.trim();
      if(!trimmed) return;
      renameTagInGroups(tag, trimmed);
      presetTags[idx] = trimmed;
      saveTags();
      renderPalette();
      renderTagList();
    });
    const delBtn = document.createElement('button');
    delBtn.className = 'icnbtn danger';
    delBtn.textContent = '削除';
    delBtn.addEventListener('click', ()=>{
      removeTagFromGroups(tag);
      presetTags.splice(idx,1);
      saveTags();
      renderPalette();
      renderTagList();
    });
    li.appendChild(span);
    li.appendChild(catTag);
    li.appendChild(editBtn);
    li.appendChild(delBtn);
    list.appendChild(li);
  });
}

document.getElementById('addTagBtn').addEventListener('click', ()=>{
  const input = document.getElementById('newTagInput');
  const category = document.getElementById('newTagCategory').value;
  const val = input.value.trim();
  if(!val) return;
  if(presetTags.includes(val)){
    showToast('同じタグが既にあります');
    return;
  }
  presetTags.push(val);
  addTagToGroup(val, category);
  input.value = '';
  saveTags();
  renderPalette();
  renderTagList();
});
document.getElementById('newTagInput').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ document.getElementById('addTagBtn').click(); }
});

document.getElementById('resetTagsBtn').addEventListener('click', ()=>{
  if(!confirm('登録したタグを削除して、初期状態に戻します。よろしいですか？')) return;
  TAG_GROUPS.length = 0;
  ORIGINAL_GROUPS.forEach(g => TAG_GROUPS.push({ name:g.name, color:g.color, tags:g.tags.slice() }));
  presetTags = DEFAULT_TAGS.slice();
  currentGroup = null;
  saveTags();
  renderPalette();
  renderTagList();
});

populateCategorySelect();

// ---------- View switching ----------
function switchView(view){
  document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('builderBar').style.display = (view === 'builder') ? 'flex' : 'none';
  window.scrollTo(0, 0);
}
document.getElementById('goTagsBtn').addEventListener('click', ()=> switchView('tags'));
document.getElementById('goBuilderBtn').addEventListener('click', ()=> switchView('builder'));

function setDefaultTitle(){
  const days = ['日','月','火','水','木','金','土'];
  const d = new Date();
  const titleEl = document.getElementById('menuTitle');
  titleEl.value = `${d.getMonth()+1}/${d.getDate()}(${days[d.getDay()]}) Practice Menu`;
}

renderSequence();
loadTags();
setDefaultTitle();
</script>
